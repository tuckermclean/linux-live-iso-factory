name: Build

on:
  push:
    branches: [master]
    tags: ['*']
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dockerfile:
              - 'Dockerfile'
            packages:
              - 'configs/portage/world'
              - 'configs/portage/versions.lock'
              - 'configs/overlay/**'
              - 'scripts/**'
              - 'rootfs/**'

  build-image:
    runs-on: ubuntu-latest
    needs: changes
    permissions:
      contents: read
      packages: write
    outputs:
      image-changed: ${{ steps.check-hash.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull existing images for cache
        run: |
          docker pull ${{ env.REGISTRY }}/monolith-builder:latest || true
          docker tag ${{ env.REGISTRY }}/monolith-builder:latest monolith-builder || true
          docker pull ${{ env.REGISTRY }}/monolith-builder-base-tools:latest || true
          docker tag ${{ env.REGISTRY }}/monolith-builder-base-tools:latest monolith-builder-base-tools || true

      - name: Capture pre-build hash
        id: pre-hash
        run: |
          echo "hash=$(docker inspect --format='{{index .Config.Labels "base-tools-hash"}}' monolith-builder 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - run: make ensure-dirs

      - name: Build image
        run: make build-image
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Upload crossdev logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crossdev-logs-${{ github.run_id }}
          path: output/portage-logs/
          retention-days: 7

      - name: Check if image changed
        id: check-hash
        run: |
          NEW_HASH=$(docker inspect --format='{{index .Config.Labels "base-tools-hash"}}' monolith-builder)
          OLD_HASH="${{ steps.pre-hash.outputs.hash }}"
          if [ "$NEW_HASH" != "$OLD_HASH" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "==> base-tools-hash changed: $OLD_HASH -> $NEW_HASH"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "==> base-tools-hash unchanged, skipping push"
          fi

      - name: Push images
        if: steps.check-hash.outputs.changed == 'true'
        run: make push-image
        env:
          REGISTRY: ${{ env.REGISTRY }}

  build:
    runs-on: ubuntu-latest
    needs: [changes, build-image]
    permissions:
      contents: read
      packages: read
    if: >
      needs.changes.outputs.packages == 'true' ||
      needs.build-image.outputs.image-changed == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      build-started-on: ${{ steps.set-version.outputs.build-started-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Set build version
        id: set-version
        run: |
          BUILD_EPOCH=$(grep '^ARG BUILD_EPOCH=' Dockerfile | cut -d= -f2)
          echo "BUILD_EPOCH=$BUILD_EPOCH" >> "$GITHUB_ENV"
          BUILD_STARTED_ON=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_STARTED_ON=$BUILD_STARTED_ON" >> "$GITHUB_ENV"
          echo "build-started-on=$BUILD_STARTED_ON" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "BUILD_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "BUILD_VERSION=$BUILD_EPOCH-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: make pull-image
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - run: make ensure-dirs ensure-volume

      - name: Sync portage
        run: make sync-portage

      - name: Restore binary package cache from S3
        run: aws s3 sync s3://${{ secrets.S3_BUCKET }}/packages/$BUILD_EPOCH/ output/packages/ || true

      - name: Build packages
        run: |
          while true; do echo "=== $(date) ==="; df -h; free -h; echo "---"; sleep 60; done &
          make build-packages JOBS=2 LOAD_AVG=2

      - name: Save binary packages to S3
        if: always()
        run: aws s3 sync output/packages/ s3://${{ secrets.S3_BUCKET }}/packages/$BUILD_EPOCH/

      - name: Save build logs to S3
        if: always()
        run: aws s3 sync output/logs/ s3://${{ secrets.S3_BUCKET }}/builds/$BUILD_VERSION/logs/

      - name: Save kernel image to S3
        if: always()
        run: |
          if [ -f output/vmlinuz ]; then
            cp output/vmlinuz output/themonolith-$BUILD_VERSION.vmlinuz
            aws s3 cp output/themonolith-$BUILD_VERSION.vmlinuz s3://${{ secrets.S3_BUCKET }}/themonolith-$BUILD_VERSION.vmlinuz
            aws s3 cp output/themonolith-$BUILD_VERSION.vmlinuz s3://${{ secrets.S3_BUCKET }}/themonolith.vmlinuz
          fi

      - name: Build rootfs
        run: make build-rootfs JOBS=2 LOAD_AVG=2

      - name: Save squashfs to S3
        if: always()
        run: |
          if [ -f output/themonolith-$BUILD_VERSION.squashfs ]; then
            aws s3 cp output/themonolith-$BUILD_VERSION.squashfs s3://${{ secrets.S3_BUCKET }}/themonolith-$BUILD_VERSION.squashfs
            aws s3 cp output/themonolith-$BUILD_VERSION.squashfs s3://${{ secrets.S3_BUCKET }}/themonolith.squashfs
          fi

      - name: Save initrd to S3
        if: always()
        run: |
          if [ -f output/themonolith-$BUILD_VERSION.initrd ]; then
            aws s3 cp output/themonolith-$BUILD_VERSION.initrd s3://${{ secrets.S3_BUCKET }}/themonolith-$BUILD_VERSION.initrd
            aws s3 cp output/themonolith-$BUILD_VERSION.initrd s3://${{ secrets.S3_BUCKET }}/themonolith.initrd
          fi

      - name: Build ISO
        run: make iso

      - name: Upload ISO to S3
        run: |
          aws s3 cp output/themonolith-$BUILD_VERSION.iso s3://${{ secrets.S3_BUCKET }}/themonolith-$BUILD_VERSION.iso
          aws s3 cp output/themonolith-$BUILD_VERSION.iso s3://${{ secrets.S3_BUCKET }}/themonolith.iso
          echo "==> Uploaded themonolith-$BUILD_VERSION.iso and themonolith.iso (latest)"

  attestation:
    runs-on: ubuntu-latest
    needs: [build-image, build]
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    if: >
      always() &&
      needs.build-image.result == 'success' &&
      needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Set build version
        run: |
          BUILD_EPOCH=$(grep '^ARG BUILD_EPOCH=' Dockerfile | cut -d= -f2)
          echo "BUILD_EPOCH=$BUILD_EPOCH" >> "$GITHUB_ENV"
          echo "BUILD_STARTED_ON=${{ needs.build.outputs.build-started-on }}" >> "$GITHUB_ENV"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "BUILD_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "BUILD_VERSION=$BUILD_EPOCH-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          fi
          # Capture the stage3 manifest digest — tag is epoch-pinned so pulling
          # now yields the same image used at build time; no rebuild required.
          docker pull "gentoo/stage3:amd64-openrc-${BUILD_EPOCH}" -q 2>/dev/null || true
          STAGE3_DIGEST=$(docker inspect "gentoo/stage3:amd64-openrc-${BUILD_EPOCH}" \
            --format '{{index .RepoDigests 0}}' 2>/dev/null \
            | grep -oP '(?<=@)sha256:\S+' || echo "")
          echo "STAGE3_DIGEST=${STAGE3_DIGEST}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: make pull-image
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - run: make ensure-dirs ensure-volume

      - name: Install squashfs-tools
        run: sudo apt-get install -y squashfs-tools

      - name: Restore squashfs from S3
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/themonolith-$BUILD_VERSION.squashfs \
            output/themonolith-$BUILD_VERSION.squashfs

      - name: Extract sysroot from squashfs
        run: |
          unsquashfs -d output/sysroot output/themonolith-$BUILD_VERSION.squashfs

      - name: Restore ISO from S3
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/themonolith-$BUILD_VERSION.iso \
            output/themonolith-$BUILD_VERSION.iso

      - name: Update Grype DB
        run: make grype-db-update

      - name: Run attestation pipeline
        run: make attestation BUILD_VERSION=$BUILD_VERSION
        continue-on-error: true

      - name: Read SLSA predicate
        id: read-predicate
        if: always()
        run: |
          PREDICATE=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('output/attestation/slsa-provenance.json'))
              print(json.dumps(d['predicate']))
          except Exception as e:
              print(f'Error reading predicate: {e}', file=sys.stderr)
              sys.exit(1)
          ")
          echo "predicate=$PREDICATE" >> "$GITHUB_OUTPUT"

      - name: Sign SLSA provenance (Sigstore via GitHub OIDC)
        uses: actions/attest@v2
        if: always() && steps.read-predicate.outcome == 'success'
        with:
          subject-path: output/themonolith-${{ env.BUILD_VERSION }}.iso
          predicate-type: https://slsa.dev/provenance/v1
          predicate: ${{ steps.read-predicate.outputs.predicate }}

      - name: Upload attestation artifacts to S3
        if: always()
        run: |
          aws s3 sync output/attestation/ \
            s3://${{ secrets.S3_BUCKET }}/attestation/$BUILD_VERSION/

      - name: Generate and upload site
        if: always()
        run: |
          # Sync ALL historical attestation records from S3 so generate-dashboard.py
          # can build the complete builds-index.json from all-time summaries.
          mkdir -p output/all-attestation
          aws s3 sync s3://${{ secrets.S3_BUCKET }}/attestation/ output/all-attestation/

          # Generate builds-index.json + copy static SPA assets into output/web/
          make dashboard ATTEST_INPUT_DIR=output/all-attestation

          # Deploy to S3 bucket root — index.html, styles.css, app/*.js, builds-index.json
          aws s3 sync output/web/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "attestation/*" --exclude "packages/*" --exclude "builds/*"

      - name: Fail if attestation failed
        run: |
          SUMMARY=output/attestation/attestation-summary.json
          if [ ! -f "$SUMMARY" ]; then
            echo "::error::attestation-summary.json not found — attestation did not produce output"
            exit 1
          fi
          OVERALL=$(python3 -c "import json; print(json.load(open('$SUMMARY')).get('overall','fail'))")
          if [ "$OVERALL" != "pass" ]; then
            echo "::error::Attestation failed (overall=$OVERALL) — see s3://${{ secrets.S3_BUCKET }}/attestation/$BUILD_VERSION/"
            exit 1
          fi
