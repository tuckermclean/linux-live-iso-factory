# Strip -static from LDFLAGS for packages that legitimately build shared
# libraries (.so files) as part of their own build process.
#
# Applied AFTER static.conf via package.env, so it undoes the -static that
# static.conf added.  These packages still get USE=static-libs (from global
# make.conf) so they produce .a archives that other packages can link against
# statically.  Their own executables will be dynamically linked — acceptable
# for library-centric packages whose binaries are developer tools.
#
# Root cause: -static in LDFLAGS is passed to ALL link steps, including the
# linker invocations that build .so files.  With musl, -static causes crt1.o
# to be linked in, which expects a main() symbol — causing the build to fail
# with "undefined reference to `main'" on the .so link step.
#
# Affected build systems: meson (ignores --disable-shared), plain Makefiles.
# Autotools packages are fine because --disable-shared (from EXTRA_ECONF)
# prevents .so targets from being generated at all.
LDFLAGS="${LDFLAGS//-static/}"
LDFLAGS="${LDFLAGS//-liconv/}"
