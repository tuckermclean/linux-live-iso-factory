# Replacement LDFLAGS for packages that legitimately build .so files as part
# of their own build (meson, plain-Makefile packages that ignore --disable-shared).
#
# Applied AFTER static.conf via package.env; directly overwrites LDFLAGS rather
# than trying to strip -static, because Portage env files only support plain
# ${VAR} expansion — bash pattern substitution (${VAR//pattern/}) is not allowed.
#
# Value = make.conf base (-Wl,--gc-sections) + PIE disable (-no-pie).
# No -static, no -liconv.  These packages still get USE=static-libs (global)
# so their .a archives exist for dependents to link against statically.
LDFLAGS="-Wl,--gc-sections -no-pie"
