# Explicitly link against libiconv for packages that use gnulib or librecode,
# which generate code calling libiconv_open/libiconv_close (external-prefixed
# symbols) instead of musl's built-in iconv, but omit -liconv from the link line.
# --whole-archive forces all members of libiconv.a to be included unconditionally,
# regardless of position in the link command.  Without this, -liconv in LDFLAGS
# is processed before the object files and archives that reference libiconv_open,
# and GNU ld's single-pass archive scanning means those references are never
# resolved.  --whole-archive sidesteps the ordering problem entirely.
LDFLAGS="${LDFLAGS} -Wl,--whole-archive,-liconv,--no-whole-archive"
