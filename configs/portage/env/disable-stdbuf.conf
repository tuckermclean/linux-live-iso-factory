# Disable the stdbuf utility for sys-apps/coreutils.
#
# stdbuf works by LD_PRELOAD-ing libstdbuf.so at runtime.  On a fully static
# system LD_PRELOAD does nothing, so stdbuf is useless.  More importantly,
# building libstdbuf.so with -static in LDFLAGS causes a link failure:
# the linker adds crt1.o (for -static) to what is supposed to be a shared
# library, producing "undefined reference to `main'".
#
# --disable-stdbuf suppresses both the stdbuf binary and libstdbuf.so,
# allowing the rest of coreutils to build fully statically.
EXTRA_ECONF="${EXTRA_ECONF} --disable-stdbuf"
