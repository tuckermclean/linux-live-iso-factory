# Force static, non-PIE linking for leaf binaries.
#
# On i486/musl, PIE + static linking conflicts — the linker can't produce
# a static-PIE binary, so gcc silently falls back to dynamic-PIE.
# Disabling PIE resolves this.
CFLAGS="${CFLAGS} -no-pie -fno-pie"
CXXFLAGS="${CXXFLAGS} -no-pie -fno-pie"
LDFLAGS="${LDFLAGS} -no-pie -static -liconv"

# For autotools/libtool packages: libtool strips -static from LDFLAGS.
# --disable-shared prevents .so creation, forcing libtool to link against
# .a archives only. Harmlessly ignored by non-autotools packages.
EXTRA_ECONF="--disable-shared --enable-static"

# xz-utils sanity check dies when liblzma.so is missing (expected with
# --disable-shared). This is the ebuild's own escape hatch.
I_KNOW_WHAT_I_AM_DOING=1
