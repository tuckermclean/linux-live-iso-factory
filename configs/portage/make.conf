# Gentoo cross-compile configuration for i486-linux-musl
#
# This file is used as the basis for the cross-compile environment's make.conf
# It will be installed to /usr/i486-linux-musl/etc/portage/make.conf

# Target architecture
CHOST="i486-linux-musl"

# Cross-compilation root — the crossdev emerge wrapper sets SYSROOT but not ROOT,
# and modern Portage requires ROOT to match SYSROOT (or both be /).
ROOT="/usr/${CHOST}"

# Compiler flags optimized for size on i486
# -march=i486: Target i486 instruction set (Pentium-compatible)
# -mtune=i486: Optimize for i486 pipeline
# -Os: Optimize for size
# -pipe: Use pipes instead of temp files
# -fno-exceptions: Disable C++ exceptions (smaller binaries)
CFLAGS="-march=i486 -mtune=i486 -Os -pipe -fno-exceptions"
CXXFLAGS="${CFLAGS}"

# Host build tools compiled during cross-compilation must use 32-bit longs
# to match the i486 target ABI. Without -m32, native tools like nethack's
# makedefs produce data files with 64-bit longs that the i486 binaries can't read.
CFLAGS_FOR_BUILD="-O2 -m32"

# Linker flags
# --gc-sections: Remove unused sections (smaller binaries)
# Note: Do NOT put -static here — it breaks shared library builds for
# dependencies (zlib, xz, etc.).  Static linking for final executables
# is handled by USE="static" in package.use instead.
LDFLAGS="-Wl,--gc-sections"

# Minimal USE flags for static, embedded-style builds
# Start with nothing, add only what's absolutely needed
USE="-* minimal static static-libs -nls -ipv6 -X -systemd unicode"

# Portage features for cross-compilation
# buildpkg: Create binary packages for reuse
# -sandbox: Disable sandbox (often breaks cross-compilation)
FEATURES="buildpkg -sandbox -usersandbox"

# Accept all keyworded ebuilds — the embedded profile (used by crossdev) has no
# parent chain into profiles/arch/x86/, so standard ~x86 matching doesn't work.
# "*" accepts any keyword but not keyword-less (live/9999) ebuilds.
ACCEPT_KEYWORDS="*"

# Parallel builds — Portage make.conf only supports ${VAR} expansion,
# not $(cmd) substitution, so we use the JOBS env var set by the build script.
MAKEOPTS="-j${JOBS}"

# Binary packages — store in the mounted /output volume so they persist
# after the container exits. Without this, PKGDIR defaults to
# ${ROOT}/var/cache/binpkgs which is inside the ephemeral container.
PKGDIR="/output/packages"
BINPKG_FORMAT="gpkg"

# Compression for binary packages
BINPKG_COMPRESS="xz"
