# unowned-allowlist.yaml
#
# Files present in the rootfs that are not owned by any Portage package.
# These are suppressed from the Pillar 4 unowned-files gate.
#
# Paths are relative to rootfs root (no leading /).
# fnmatch glob patterns: * matches within a path segment, ** matches across.
#
# Goal: this list shrinks over time as items move into proper ebuilds.

allowlist:
  # ── FHS structural directories created by build-rootfs.sh ──────────────────
  # Standard mount points and empty directories required by the FHS.
  # Created by build-rootfs.sh mkdir -p; not owned by any Portage package.
  - dev
  - home
  - mnt
  - opt
  - proc
  - root
  - run
  - sys
  - etc/network
  - var/log
  - var/spool

  # ── Portage system directories ──────────────────────────────────────────────
  # Directories created implicitly by the package manager; not owned by any
  # package, but their contents are tracked by the glob patterns below.
  - tmp
  - var/cache
  - var/cache/edb
  - var/db
  - var/db/pkg
  - var/lib/portage
  - var/tmp

  # ── Portage metadata ────────────────────────────────────────────────────────
  # The Portage DB itself is not tracked as owned files
  - var/db/pkg/**
  - var/cache/edb/**
  - var/lib/portage/**

  # ── /etc config files written by build-rootfs.sh ────────────────────────────
  # Pending proper ebuilds
  - etc/passwd
  - etc/group
  - etc/shadow
  - etc/fstab
  - etc/hosts
  - etc/hostname
  - etc/motd
  - etc/issue
  - etc/resolv.conf
  - etc/profile
  - etc/securetty
  - etc/shells
  - etc/inittab
  - etc/network/interfaces

  # ── Init scripts written by build-rootfs.sh ─────────────────────────────────
  - etc/init.d/rcS
  - etc/init.d/rcK
  - etc/init.d/S20keygen
  - etc/init.d/S30gpm
  - etc/init.d/S40network
  - etc/init.d/S50advisory
  - etc/monolith-release
  - etc/os-release

  # ── Advisory scripts (pending proper ebuilds) ───────────────────────────────
  - usr/sbin/monolith-advisory-check
  - etc/profile.d/monolith-advisory.sh

  # ── Prompt customisation ─────────────────────────────────────────────────────
  - etc/bash/bashrc.d/99-monolith-square.bash

  # ── Root home — bash skel files copied by build-rootfs.sh ───────────────────
  - root/.bash_profile
  - root/.bashrc
  - root/.bash_logout

  # ── Symlinks set by build-rootfs.sh ─────────────────────────────────────────
  - bin/sh
  - usr/bin/more

  # ── Terminfo case-collision symlinks ────────────────────────────────────────
  # Single-char lowercase → uppercase symlinks created by build-rootfs.sh to fix
  # NTFS case-insensitivity collisions (e.g. l -> L, a -> A)
  - usr/share/terminfo/?

  # ── ld.so.cache — generated by ldconfig in postinst ─────────────────────────
  - etc/ld.so.cache

  # ── var/run and var/lock — symlinks to /run set by build-rootfs.sh ──────────
  - var/run
  - var/lock

  # ── /etc postinst artifacts — written by pkg_postinst hooks, not tracked ────
  # env-update generates profile.env and csh.env from /etc/env.d/ fragments.
  # binutils pkg_postinst writes env.d/05binutils and binutils/config-*.
  # shadow pkg_postinst writes group-, gshadow, subgid, subuid, .pwd.lock.
  # ldconfig writes ld.so.conf.
  # systemd-tmpfiles/environment.d entries come from toolchain postinst.
  - etc/.pwd.lock
  - etc/csh.env
  - etc/env.d/05binutils
  - etc/env.d/binutils/config-*
  - etc/environment.d
  - etc/environment.d/10-gentoo-env.conf
  - etc/group-
  - etc/gshadow
  - etc/ld.so.conf
  - etc/profile.env
  - etc/subgid
  - etc/subuid

  # ── binutils eselect symlinks — managed by binutils-config in pkg_postinst ──
  # binutils-config uses eselect to install these unversioned /usr/bin/
  # wrappers pointing into /usr/lib/binutils/. They are intentionally absent
  # from CONTENTS because eselect manages them dynamically.
  - usr/bin/addr2line
  - usr/bin/ar
  - usr/bin/as
  - usr/bin/c++filt
  - usr/bin/elfedit
  - usr/bin/gprof
  - usr/bin/ld
  - usr/bin/ld.bfd
  - usr/bin/ldd
  - usr/bin/nm
  - usr/bin/objcopy
  - usr/bin/objdump
  - usr/bin/ranlib
  - usr/bin/readelf
  - usr/bin/size
  - usr/bin/strings
  - usr/bin/strip

  # ── binutils-data info/dir — generated by install-info in pkg_postinst ──────
  # The texinfo 'dir' index is regenerated from .info files; not in CONTENTS.
  - usr/share/binutils-data/*/*/info/dir

  # ── nethack runtime state — created on first run ────────────────────────────
  # nethack initializes these files when the game first starts; they are not
  # installed by the ebuild (no pre-existing content to ship).
  - var/games/nethack/logfile
  - var/games/nethack/perm
  - var/games/nethack/record
  - var/games/nethack/xlogfile

  # ── Portage news — written by emerge during pkg installation ─────────────────
  # emerge writes news items to var/lib/gentoo/news/ during postinst;
  # the skip/unread tracking files are not owned by any package.
  - var/lib/gentoo/news/news-gentoo.skip
  - var/lib/gentoo/news/news-gentoo.unread
