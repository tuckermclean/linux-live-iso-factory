# license-policy.yaml
#
# Defines which SPDX license identifiers are acceptable for packages
# in The Monolith ISO. The check-licenses.py script enforces this policy
# against the enriched SBOM generated by Syft + enrich-sbom.py.
#
# Portage LICENSE field expressions are supported:
#   "MIT"                   simple single license
#   "MIT BSD-2-Clause"      conjunctive (all must be allowed)
#   "|| ( MIT GPL-2.0+ )"   disjunctive (at least one must be allowed)
#
# Portage license names are mapped to SPDX via gentoo_to_spdx before
# policy checking. Add entries to gentoo_to_spdx for any Gentoo license
# name that doesn't match the SPDX identifier directly.

allowed_spdx:
  - MIT
  - BSD-2-Clause
  - BSD-3-Clause
  - BSD-4-Clause
  - Apache-2.0
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0-only
  - GPL-3.0-or-later
  - LGPL-2.0-only
  - LGPL-2.0-or-later
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - LGPL-3.0-only
  - LGPL-3.0-or-later
  - ISC
  - Zlib
  - PSF-2.0
  - CC0-1.0
  - 0BSD
  - MPL-1.1
  - MPL-2.0
  - Artistic
  - Artistic-2.0
  - public-domain
  - openssl        # OpenSSL pre-3.0 license (not SPDX; permissive)
  - SSLeay         # SSLeay / Eric Young license (permissive)
  - HPND           # Historical Permission Notice and Disclaimer
  - blessing       # SQLite "blessing" (public domain-ish)
  - Unicode        # Unicode license
  - unicode        # case variant
  - curl           # curl/MIT-style license used by curl package
  - Info-ZIP       # Info-ZIP license (permissive)
  - Vim            # Vim charityware license (permissive)
  - ZSH            # ZSH license (MIT-like)
  - BZIP2          # bzip2/libbzip2 license (BSD-like)
  - FDL-1.2-or-later  # GNU Free Documentation License (for man pages)
  - FDL-1.3-or-later  # GNU Free Documentation License
  - BEER-WARE      # Poul-Henning Kamp beerware (permissive)
  - nethack        # NetHack General Public License
  - tcp_wrappers_license  # Wietse Venema BSD-like

# Gentoo uses non-SPDX names for many common licenses. This table maps
# Gentoo names to SPDX identifiers for policy matching.
gentoo_to_spdx:
  "GPL-2":          "GPL-2.0-or-later"
  "GPL-2+":         "GPL-2.0-or-later"
  "GPL-3":          "GPL-3.0-or-later"
  "GPL-3+":         "GPL-3.0-or-later"
  "LGPL-2":         "LGPL-2.0-or-later"
  "LGPL-2+":        "LGPL-2.0-or-later"
  "LGPL-2.1":       "LGPL-2.1-or-later"
  "LGPL-2.1+":      "LGPL-2.1-or-later"
  "LGPL-3":         "LGPL-3.0-or-later"
  "LGPL-3+":        "LGPL-3.0-or-later"
  "BSD":            "BSD-3-Clause"
  "BSD-2":          "BSD-2-Clause"
  "BSD-4":          "BSD-4-Clause"
  "ISC":            "ISC"
  "MIT":            "MIT"
  "Apache-2":       "Apache-2.0"
  "Apache-2.0":     "Apache-2.0"
  "openssl":        "openssl"
  "SSLeay":         "SSLeay"
  "PSF-2":          "PSF-2.0"
  "PSF-2.4":        "PSF-2.0"
  "public-domain":  "public-domain"
  "ZLib":           "Zlib"
  "Zlib":           "Zlib"
  "HPND":           "HPND"
  "blessing":       "blessing"
  "Unicode":        "Unicode"
  "unicode":        "unicode"
  "CC0-1.0":        "CC0-1.0"
  "0BSD":           "0BSD"
  "curl":           "curl"
  "Info-ZIP":       "Info-ZIP"
  "Vim":            "Vim"
  "vim":            "Vim"
  "ZSH":            "ZSH"
  "BZIP2":          "BZIP2"
  "BEER-WARE":      "BEER-WARE"
  "nethack":        "nethack"
  "tcp_wrappers":   "tcp_wrappers_license"
  "Artistic":       "Artistic"
  "Artistic-2":     "Artistic-2.0"
  "MPL-1.1":        "MPL-1.1"
  "MPL-2.0":        "MPL-2.0"
  "FDL-1.3+":       "FDL-1.3-or-later"
  "FDL-1.2+":       "FDL-1.2-or-later"

# Licenses that are explicitly prohibited regardless of allowed_spdx.
# An empty list means no additional denials beyond "not in allowed_spdx".
denied_spdx: []
