# license-policy.yaml
#
# Defines which SPDX license identifiers are acceptable for packages
# in The Monolith ISO. The check-licenses.py script enforces this policy
# against the enriched SBOM generated by Syft + enrich-sbom.py.
#
# Portage LICENSE field expressions are supported:
#   "MIT"                   simple single license
#   "MIT BSD-2-Clause"      conjunctive (all must be allowed)
#   "|| ( MIT GPL-2.0+ )"   disjunctive (at least one must be allowed)
#
# Portage license names are mapped to SPDX via gentoo_to_spdx before
# policy checking. Add entries to gentoo_to_spdx for any Gentoo license
# name that doesn't match the SPDX identifier directly.

allowed_spdx:
  - MIT
  - BSD-2-Clause
  - BSD-3-Clause
  - Apache-2.0
  - GPL-2.0-only
  - GPL-2.0-or-later
  - LGPL-2.0-only
  - LGPL-2.0-or-later
  - LGPL-2.1-only
  - LGPL-2.1-or-later
  - ISC
  - Zlib
  - PSF-2.0
  - public-domain
  - openssl        # OpenSSL pre-3.0 license (not SPDX; permissive)
  - SSLeay         # SSLeay / Eric Young license (permissive)
  - HPND           # Historical Permission Notice and Disclaimer
  - blessing       # SQLite "blessing" (public domain-ish)
  - Unicode        # Unicode license
  - unicode        # case variant

# Gentoo uses non-SPDX names for many common licenses. This table maps
# Gentoo names to SPDX identifiers for policy matching.
gentoo_to_spdx:
  "GPL-2":          "GPL-2.0-or-later"
  "GPL-2+":         "GPL-2.0-or-later"
  "GPL-3":          "GPL-3.0-or-later"
  "GPL-3+":         "GPL-3.0-or-later"
  "LGPL-2":         "LGPL-2.0-or-later"
  "LGPL-2+":        "LGPL-2.0-or-later"
  "LGPL-2.1":       "LGPL-2.1-or-later"
  "LGPL-2.1+":      "LGPL-2.1-or-later"
  "BSD":            "BSD-3-Clause"
  "BSD-2":          "BSD-2-Clause"
  "BSD-4":          "BSD-4-Clause"
  "ISC":            "ISC"
  "MIT":            "MIT"
  "Apache-2":       "Apache-2.0"
  "Apache-2.0":     "Apache-2.0"
  "openssl":        "openssl"
  "SSLeay":         "SSLeay"
  "PSF-2":          "PSF-2.0"
  "PSF-2.4":        "PSF-2.0"
  "public-domain":  "public-domain"
  "ZLib":           "Zlib"
  "Zlib":           "Zlib"
  "HPND":           "HPND"
  "blessing":       "blessing"
  "Unicode":        "Unicode"
  "unicode":        "unicode"

# Licenses that are explicitly prohibited regardless of allowed_spdx.
# An empty list means no additional denials beyond "not in allowed_spdx".
denied_spdx: []
